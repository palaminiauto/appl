<script>
    // 1. Funzione per attendere che la variabile CONFIG sia definita
    function waitConfig(callback) {
        if (typeof CONFIG !== 'undefined') {
            callback();
        } else {
            console.log("Config non ancora pronta, riprovo tra 100ms...");
            setTimeout(() => waitConfig(callback), 100);
        }
    }

    // 2. Funzione Fetch Universale
    async function wFetch(action, payload = {}) {
        const response = await fetch(CONFIG.workerUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                action,
                key: CONFIG.key,
                spreadsheetId: CONFIG.spreadsheetId,
                ...payload
            })
        });
        const result = await response.json();
        if (result.error) throw new Error(result.error);
        return result;
    }

    // 3. Funzione di inizializzazione
    async function init() {
        const statusEl = document.getElementById('status');
        const contentEl = document.getElementById('main-content');

        try {
            statusEl.innerText = "Sincronizzazione...";
            
            // Carichiamo i dati dal foglio CALENDARIO
            const data = await wFetch('getSheets', { sheets: ["CALENDARIO"] });
            
            if (!data.CALENDARIO) throw new Error("Foglio 'CALENDARIO' non trovato nel database.");
            
            renderOrizzontale(data.CALENDARIO.rows);
            statusEl.innerText = "Online";
        } catch (err) {
            console.error(err);
            statusEl.innerText = "Errore";
            contentEl.innerHTML = `
                <div style="color:red; padding:40px; text-align:center;">
                    <strong>Errore durante il caricamento dei dati:</strong><br>
                    ${err.message}<br><br>
                    <button onclick="location.reload()" style="padding:10px; cursor:pointer;">Riprova</button>
                </div>`;
        }
    }

    // 4. Logica di rendering
    function renderOrizzontale(rows) {
        const contentEl = document.getElementById('main-content');
        if (!rows || rows.length === 0) {
            contentEl.innerHTML = "<div class='loading'>Nessun appuntamento trovato.</div>";
            return;
        }

        // Raggruppiamo i dati per DATA
        const giorni = {};
        rows.forEach(r => {
            const d = r.DATA || "Senza Data";
            if (!giorni[d]) giorni[d] = [];
            giorni[d].push(r);
        });

        let html = "";
        for (const data in giorni) {
            html += `
            <div class="colonna-giorno">
                <div class="header-giorno">${data}</div>
                <div class="lista-appuntamenti">
                    ${giorni[data].map(app => `
                        <div class="card-appuntamento">
                            <div class="ora">${app.ORA || '--:--'}</div>
                            <strong>${app.CLIENTE || 'N/A'}</strong><br>
                            <span style="color:#666">${app.VEICOLO || ''}</span>
                            ${app.NOTE ? `<div style="margin-top:5px; padding-top:5px; border-top:1px solid #eee; font-style:italic; color:#888;">${app.NOTE}</div>` : ''}
                        </div>
                    `).join('')}
                </div>
            </div>`;
        }
        contentEl.innerHTML = html;
    }

    // 5. Partenza: aspetta CONFIG e poi lancia init
    waitConfig(init);
</script>
